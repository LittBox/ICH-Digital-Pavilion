<!DOCTYPE html>
<html>
<head>
    <title>傣乡彝韵·非遗数字展馆</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="imgs/logo/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="imgs/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="imgs/logo/favicon-16x16.png">
    <link rel="apple-touch-icon" href="imgs/logo/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
</head>
<body>
    <div id="panorama-container" style="width: 100vw; height: 100vh;"></div>

    <div id="detail-overlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="close-btn">&times;</span>
            
            <!-- 顶部大图区域 -->
            <div class="detail-main-view">
                <img id="detail-main-img" src="" alt="">
            </div>
            
            <!-- 中间滑动图集区域 -->
            <div class="detail-gallery-container">
                <div id="detail-gallery" class="gallery-thumbs"></div>
            </div>
            
            <!-- 底部信息区域 -->
            <div class="detail-info-area">
                <h2 id="detail-name"></h2>
                <p id="detail-ethnicity" class="ethnicity-badge"></p>
                <p id="detail-desc"></p>
                <div id="detail-fieldnote" class="fieldnote"></div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
